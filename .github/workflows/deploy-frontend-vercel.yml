name: Deploy Frontend to Vercel

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "frontend/**"
      - "vercel.json"
      - ".github/workflows/deploy-frontend-vercel.yml"

permissions:
  contents: read

jobs:
  deploy-frontend:
    name: Deploy frontend
    runs-on: ubuntu-latest

    env:
      FLY_APP_NAME: ${{ vars.FLY_APP_NAME || 'araf-protocol-backend' }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      FRONTEND_DOMAIN: ${{ vars.FRONTEND_DOMAIN || 'araf-protocol-demo.vercel.app' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate Vercel configuration
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          test -n "$VERCEL_TOKEN" || { echo "VERCEL_TOKEN secret is required."; exit 1; }
          test -n "$VERCEL_ORG_ID" || { echo "VERCEL_ORG_ID secret is required."; exit 1; }
          test -n "$VERCEL_PROJECT_ID" || { echo "VERCEL_PROJECT_ID secret is required."; exit 1; }
          test -n "$FRONTEND_DOMAIN" || { echo "FRONTEND_DOMAIN repository variable is required."; exit 1; }

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_URL: https://${{ env.FLY_APP_NAME }}.fly.dev
          VITE_ALLOWED_CHAIN_ID: "84532"
          VITE_TESTNET_USDC_FAUCET_URL: ${{ vars.VITE_TESTNET_USDC_FAUCET_URL || 'https://faucet.circle.com/' }}
        run: npm run build

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Pull Vercel project configuration
        working-directory: frontend
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Deploy frontend to Vercel production
        working-directory: frontend
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          vercel deploy --prod --yes --token="$VERCEL_TOKEN" \
            --build-env VITE_API_URL="https://$FLY_APP_NAME.fly.dev" \
            --build-env VITE_ALLOWED_CHAIN_ID="84532" \
            --build-env VITE_TESTNET_USDC_FAUCET_URL="${{ vars.VITE_TESTNET_USDC_FAUCET_URL || 'https://faucet.circle.com/' }}"

      - name: Validate Base and Farcaster discovery metadata
        run: |
          set -euo pipefail
          curl --fail --show-error --silent "https://$FRONTEND_DOMAIN/" | tee /tmp/index.html >/dev/null
          grep -q 'name="base:app_id"' /tmp/index.html
          grep -q 'name="fc:miniapp"' /tmp/index.html
          curl --fail --show-error --silent "https://$FRONTEND_DOMAIN/.well-known/farcaster.json" | tee /tmp/farcaster.json >/dev/null
          node -e "const fs=require('fs'); const manifest=JSON.parse(fs.readFileSync('/tmp/farcaster.json','utf8')); if (!manifest.accountAssociation || !manifest.miniapp?.homeUrl) process.exit(1);"
